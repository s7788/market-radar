<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#06080f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="每日市場雷達：股市、AI趨勢、美林時鐘、經濟週期">
  <title>市場 Pulse</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header id="app-header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12h3l3-9 4 18 3-9h5"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">市場 <span>Pulse</span></span>
        <span id="build-version" class="brand-tag"></span>
      </div>
    </div>
    <div class="head-right">
      <div id="live-pill" class="live-pill" hidden>
        <span class="live-dot"></span>
        <span>LIVE</span>
      </div>
      <span id="last-updated"></span>
      <button id="refresh-btn" class="icon-btn" title="刷新" aria-label="刷新">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/>
        </svg>
      </button>
    </div>
  </header>

  <main id="tab-content"></main>

  <nav id="bottom-nav"></nav>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
