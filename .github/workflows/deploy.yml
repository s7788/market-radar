name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build config.js from secrets
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          GH_API_TOKEN: ${{ secrets.GH_API_TOKEN }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          cat > config.js << EOF
          const CONFIG = {
            POLYGON_API_KEY: '${POLYGON_API_KEY}',
            FUGLE_API_KEY: '${FUGLE_API_KEY}',
            GITHUB_TOKEN: '${GH_API_TOKEN}',
            NEWS_API_KEY: '${NEWS_API_KEY}',
            WATCHLIST_US: ['AAPL', 'NVDA', 'MSFT', 'META', 'GOOGL', 'AMZN'],
            WATCHLIST_TW: ['2330', '2317', '2454', '2382', '2308', '3017'],
          };
          EOF

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_COREAEE_65E7F }}
          channelId: live
          projectId: coreaee-65e7f
