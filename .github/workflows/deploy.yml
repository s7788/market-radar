name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build config.js from secrets
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          FUGLE_API_KEY: ${{ secrets.FUGLE_API_KEY }}
          GH_API_TOKEN: ${{ secrets.GH_API_TOKEN }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          CORS_PROXY: ${{ secrets.CORS_PROXY }}
        run: |
          BUILD_VERSION=$(TZ='Asia/Taipei' date '+%Y%m%d%H%M')
          CORS_PROXY_VAL="${CORS_PROXY:-https://corsproxy.io/?url=}"
          cat > config.js << EOF
          const CONFIG = {
            TWELVE_DATA_API_KEY: '${TWELVE_DATA_API_KEY}',
            FUGLE_API_KEY: '${FUGLE_API_KEY}',
            GITHUB_TOKEN: '${GH_API_TOKEN}',
            GNEWS_API_KEY: '${GNEWS_API_KEY}',
            FRED_API_KEY: '${FRED_API_KEY}',
            CORS_PROXY: '${CORS_PROXY_VAL}',
            BUILD_VERSION: '${BUILD_VERSION}',
            WATCHLIST_US: ['AAPL', 'NVDA', 'MSFT', 'META', 'GOOGL', 'AMZN', 'TSLA', 'NBIS', 'ARM', 'AMD', 'ALAB', 'CRSP', 'MU', 'VRT', 'AVGO', 'CRWV', 'LEU', 'ONDS', 'PLTR', 'SMCI', 'SNDK', 'TSM', 'UUUU', 'VIX', 'VRT'],
            WATCHLIST_TW: ['2330', '2317', '2454', '2382', '2308', '3017'],
          };
          EOF

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_COREAEE_65E7F }}
          channelId: live
          projectId: coreaee-65e7f
